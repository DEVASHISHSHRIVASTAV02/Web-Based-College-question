<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Login System</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f0f2f5;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 300px;
        text-align: center;
      }
      h2 {
        margin-bottom: 20px;
        color: #333;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      .error {
        color: red;
        font-size: 14px;
        margin-top: 10px;
      }
      .welcome,
      .logout {
        display: none;
      }
      .logout {
        background-color: #dc3545;
        margin-top: 20px;
      }
      .logout:hover {
        background-color: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="container" id="container">
      <!-- Login Form -->
      <div id="loginSection">
        <h2>Login</h2>
        <form id="loginForm" onsubmit="return false;">
          <input type="text" id="username" placeholder="Username" required />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <button onclick="handleLogin()">Login</button>
          <div id="error" class="error"></div>
        </form>
      </div>

      <!-- Welcome Section -->
      <div id="welcomeSection" class="welcome">
        <h2>Welcome, <span id="displayUsername"></span>!</h2>
        <p>You have successfully logged in.</p>
        <button class="logout" onclick="handleLogout()">Logout</button>
      </div>
    </div>

    <script>
      // Simulated user credentials (replace with server-side validation in production)
      const validCredentials = {
        username: "admin",
        password: "password123",
      };

      // Check if user is already "logged in" using localStorage
      window.onload = function () {
        if (localStorage.getItem("username")) {
          showWelcomePage(localStorage.getItem("username"));
        }
      };

      function handleLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorDiv = document.getElementById("error");

        // Client-side validation
        if (username === "" || password === "") {
          errorDiv.textContent = "Username and password are required.";
          return;
        }
        if (username.length < 3) {
          errorDiv.textContent = "Username must be at least 3 characters long.";
          return;
        }
        if (password.length < 6) {
          errorDiv.textContent = "Password must be at least 6 characters long.";
          return;
        }

        // Simulate server-side authentication
        if (
          username === validCredentials.username &&
          password === validCredentials.password
        ) {
          // Simulate session with localStorage
          localStorage.setItem("username", username);
          showWelcomePage(username);
          errorDiv.textContent = "";
        } else {
          errorDiv.textContent = "Invalid username or password.";
        }
      }

      function showWelcomePage(username) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("welcomeSection").style.display = "block";
        document.getElementById("displayUsername").textContent = username;
      }

      function handleLogout() {
        // Clear "session"
        localStorage.removeItem("username");
        document.getElementById("loginSection").style.display = "block";
        document.getElementById("welcomeSection").style.display = "none";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("error").textContent = "";
      }
    </script>
  </body>
</html>
