<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send Email</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f2f5;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 400px;
        text-align: center;
      }
      h2 {
        margin-bottom: 20px;
        color: #333;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      .error,
      .success {
        font-size: 14px;
        margin: 10px 0;
      }
      .error {
        color: red;
      }
      .success {
        color: green;
      }
      .sent-emails {
        margin-top: 20px;
        text-align: left;
      }
      .sent-emails ul {
        list-style: none;
        padding: 0;
      }
      .sent-emails li {
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Send Email</h2>
      <form id="emailForm" onsubmit="return false;">
        <input type="email" id="to" placeholder="Recipient Email" required />
        <input type="text" id="subject" placeholder="Subject" required />
        <textarea id="message" placeholder="Message" required></textarea>
        <button onclick="sendEmail()">Send Email</button>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
      </form>
      <div class="sent-emails">
        <h3>Sent Emails</h3>
        <ul id="emailList"></ul>
      </div>
    </div>

    <script>
      // Load sent emails from localStorage on page load
      window.onload = function () {
        displaySentEmails();
      };

      function sendEmail() {
        const to = document.getElementById("to").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const message = document.getElementById("message").value.trim();
        const errorDiv = document.getElementById("error");
        const successDiv = document.getElementById("success");

        // Clear previous messages
        errorDiv.textContent = "";
        successDiv.textContent = "";

        // Client-side validation
        if (to === "" || subject === "" || message === "") {
          errorDiv.textContent = "All fields are required.";
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
          errorDiv.textContent = "Please enter a valid email address.";
          return;
        }
        if (subject.length < 3) {
          errorDiv.textContent = "Subject must be at least 3 characters long.";
          return;
        }
        if (message.length < 10) {
          errorDiv.textContent = "Message must be at least 10 characters long.";
          return;
        }

        // Simulate email sending
        const emailData = {
          to,
          subject,
          message,
          timestamp: new Date().toLocaleString(),
        };

        // Store email in localStorage
        let sentEmails = JSON.parse(localStorage.getItem("sentEmails")) || [];
        sentEmails.push(emailData);
        localStorage.setItem("sentEmails", JSON.stringify(sentEmails));

        // Show success message and clear form
        successDiv.textContent = "Email sent successfully! (Simulated)";
        document.getElementById("emailForm").reset();

        // Update sent emails list
        displaySentEmails();
      }

      function displaySentEmails() {
        const emailList = document.getElementById("emailList");
        const sentEmails = JSON.parse(localStorage.getItem("sentEmails")) || [];
        emailList.innerHTML = "";

        if (sentEmails.length === 0) {
          emailList.innerHTML = "<li>No emails sent yet.</li>";
          return;
        }

        sentEmails.forEach((email) => {
          const li = document.createElement("li");
          li.innerHTML = `<strong>To:</strong> ${email.to}<br>
                               <strong>Subject:</strong> ${email.subject}<br>
                               <strong>Time:</strong> ${email.timestamp}`;
          emailList.appendChild(li);
        });
      }
    </script>
  </body>
</html>
