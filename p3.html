<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Implementation Demo</title>
    
    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .internal-style {
            color: #4CAF50;
            font-size: 24px;
            font-weight: bold;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: #3498db; text-align: center;">Inline CSS Example</h1>

    <p class="internal-style">This is styled using internal CSS.</p>

    <div class="external-style">This is styled using external CSS.</div>

</body>
</html>
